# ZENTRALE PIN-KONFIGURATION
# GPIOxx muss vor dem Kompilieren ersetzt werden.
# Für Waveshare ESP32-S3-ETH/W5500 sind Ethernet-Pins reserviert.

substitutions:
  # W5500 Ethernet
  pin_eth_clk: GPIO13
  pin_eth_mosi: GPIO11
  pin_eth_miso: GPIO12
  pin_eth_cs: GPIO14
  pin_eth_interrupt: GPIO10
  pin_eth_reset: GPIO9

  # I2C: INA226 12V + INA226 5V (Module mit eigenen Pull-ups)
  # GPIO47/48 = frei (kein Strapping/Flash/PSRAM/Ethernet)
  pin_i2c_sda: GPIO48
  pin_i2c_scl: GPIO47

  # Temperatur/Feuchte (Testaufbau)
  pin_dht: GPIO0              # DHT22 (Temp + Feuchte) -- ACHTUNG: Strapping-Pin
  pin_ds18b20_av: GPIO1       # DS18B20 #1 (AV Receiver), eigener 1-Wire-Bus
  pin_ds18b20_cabinet: GPIO2  # DS18B20 #2 (Cabinet), eigener 1-Wire-Bus

  # LED-Datenleitungen (2 Strips): ESP32 -> 74AHCT125 -> 330 Ohm -> Strip DATA
  # ACHTUNG: GPIO45/46 sind Strapping-Pins -> falls Boot zickt, umlegen.
  pin_led_sideboard: GPIO45   # Sideboard, 112 px
  pin_led_glass_edge: GPIO46  # Cabinet Glass Edge, 103 px

  # Motorcontroller IBT-2 (BTS7960): 2x PWM + 1x Enable (R_EN+L_EN gebrueckt)
  # Auf GPIO39-41 (JTAG-Pins MTCK/MTDO/MTDI, als I/O nutzbar; externes JTAG entfaellt)
  pin_motor_ren: GPIO39    # Enable (R_EN und L_EN zusammen auf GPIO39)
  pin_motor_len: GPIO39    # -> gleicher Pin wie ren (gebrueckt)
  pin_motor_rpwm: GPIO40   # PWM rechts
  pin_motor_lpwm: GPIO41   # PWM links

  # Encoder (Quadratur A/B)
  pin_encoder_a: GPIO16
  pin_encoder_b: GPIO18
  # Endschalter (USB bleibt erhalten -> GPIO19/20 NICHT verwenden)
  pin_endstop_top: GPIO38     # sauberer I/O
  pin_endstop_bottom: GPIO44  # UART0 RX, als Eingang ok (keine UART-Bridge auf dem Board)
  # Dritter freier Pin: GPIO3 (Strapping, als Eingang ok) -- Zweck noch offen

  # 4-Pin-Fan (Testaufbau): PWM 25 kHz, Tacho open-collector (Pull-up noetig)
  pin_fan_pwm: GPIO17   # PWM-Steuerung
  pin_fan_tach: GPIO21  # Tacho / Drehzahl
