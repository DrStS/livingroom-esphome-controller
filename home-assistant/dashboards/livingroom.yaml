title: Living Room
views:
  - title: Overview
    path: overview
    icon: mdi:sofa
    cards:
      - type: entities
        title: Whole Room Mode
        show_header_toggle: false
        entities:
          - entity: input_select.livingroom_mode
          - entity: select.livingroom_light_scene
          - entity: number.livingroom_effect_intensity
          - entity: number.livingroom_effect_speed

      - type: grid
        title: Quick Modes
        columns: 2
        square: false
        cards:
          - type: button
            name: Romantic Campfire
            icon: mdi:campfire
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: Romantic Campfire

          - type: button
            name: Cinema
            icon: mdi:movie-open
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: Cinema

          - type: button
            name: Gaming
            icon: mdi:controller
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: Gaming

          - type: button
            name: Maintenance
            icon: mdi:tools
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: Maintenance

          - type: button
            name: TV Lift Show
            icon: mdi:television
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: TV Lift Show

          - type: button
            name: Off
            icon: mdi:power
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: Off

      - type: entities
        title: TV Lift
        show_header_toggle: false
        entities:
          - entity: cover.tv_lift
          - entity: sensor.tv_lift_position_percent
          - entity: sensor.tv_lift_position_pulses
          - entity: binary_sensor.tv_lift_homed
          - entity: binary_sensor.tv_lift_fault
          - entity: button.tv_lift_reference
          - entity: button.tv_lift_clear_fault
          - entity: button.tv_lift_simulate_fault

      - type: entities
        title: Light Zones
        entities:
          - entity: light.sideboard_ambient
          - entity: light.cabinet_glass_edge
          - entity: light.cabinet_inner_diffuser

      - type: entities
        title: Power Rails
        entities:
          - entity: sensor.rail_12v_voltage
          - entity: sensor.rail_12v_current
          - entity: sensor.rail_12v_power
          - entity: sensor.rail_5v_voltage
          - entity: sensor.rail_5v_current
          - entity: sensor.rail_5v_power

      - type: history-graph
        title: Lift and Rails
        hours_to_show: 2
        entities:
          - sensor.tv_lift_position_percent
          - sensor.rail_12v_current
          - sensor.rail_5v_current
          - sensor.av_fan_rpm

      - type: entities
        title: Climate and Fan
        entities:
          - entity: sensor.av_receiver_temperature
          - entity: sensor.cabinet_temperature
          - entity: sensor.livingroom_temperature
          - entity: sensor.livingroom_humidity
          - entity: sensor.av_fan_rpm
