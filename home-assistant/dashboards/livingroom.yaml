title: Living Room
views:
  - title: Overview
    path: overview
    icon: mdi:sofa
    cards:
      - type: entities
        title: Whole Room Mode
        show_header_toggle: false
        entities:
          - entity: input_select.livingroom_mode
          - entity: select.wohnzimmer_controller_livingroom_light_scene
          - entity: number.wohnzimmer_controller_livingroom_effect_intensity
          - entity: number.wohnzimmer_controller_livingroom_effect_speed

      - type: grid
        title: Quick Modes
        columns: 2
        square: false
        cards:
          - type: button
            name: Romantic Campfire
            icon: mdi:campfire
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: Romantic Campfire
          - type: button
            name: Cinema
            icon: mdi:movie-open
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: Cinema
          - type: button
            name: Gaming
            icon: mdi:controller
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: Gaming
          - type: button
            name: Maintenance
            icon: mdi:tools
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: Maintenance
          - type: button
            name: TV Lift Show
            icon: mdi:television
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: TV Lift Show
          - type: button
            name: Off
            icon: mdi:power
            tap_action:
              action: call-service
              service: script.livingroom_set_mode
              data:
                mode: Off

      - type: tile
        entity: cover.wohnzimmer_controller_tv_lift
        name: TV Lift
        features:
          - type: cover-open-close
          - type: cover-position

      - type: entities
        title: Light Zones
        entities:
          - entity: light.wohnzimmer_controller_sideboard_ambient
          - entity: light.wohnzimmer_controller_cabinet_glass_edge
          - entity: light.wohnzimmer_controller_cabinet_inner_diffuser

      - type: entities
        title: TV Lift Status
        show_header_toggle: false
        entities:
          - entity: binary_sensor.wohnzimmer_controller_tv_lift_homed
          - entity: binary_sensor.wohnzimmer_controller_tv_lift_fault
          - entity: button.wohnzimmer_controller_tv_lift_reference
          - entity: button.wohnzimmer_controller_tv_lift_clear_fault

      # ---- Wert + Verlaufsgraph pro Sensor (openHAB-Stil) ----
      - type: grid
        title: Leistung / Strom
        columns: 2
        square: false
        cards:
          - type: sensor
            entity: sensor.wohnzimmer_controller_rail_12v_power
            name: 12V Leistung
            graph: line
            hours_to_show: 6
          - type: sensor
            entity: sensor.wohnzimmer_controller_rail_12v_current
            name: 12V Strom
            graph: line
            hours_to_show: 6
          - type: sensor
            entity: sensor.wohnzimmer_controller_rail_12v_voltage
            name: 12V Spannung
            graph: line
            hours_to_show: 6
          - type: sensor
            entity: sensor.wohnzimmer_controller_rail_5v_power
            name: 5V Leistung
            graph: line
            hours_to_show: 6
          - type: sensor
            entity: sensor.wohnzimmer_controller_rail_5v_current
            name: 5V Strom
            graph: line
            hours_to_show: 6
          - type: sensor
            entity: sensor.wohnzimmer_controller_rail_5v_voltage
            name: 5V Spannung
            graph: line
            hours_to_show: 6

      - type: grid
        title: Klima / Lüfter / Lift
        columns: 2
        square: false
        cards:
          - type: sensor
            entity: sensor.wohnzimmer_controller_av_receiver_temperature
            name: AV Receiver
            graph: line
            hours_to_show: 12
          - type: sensor
            entity: sensor.wohnzimmer_controller_cabinet_temperature
            name: Cabinet
            graph: line
            hours_to_show: 12
          - type: sensor
            entity: sensor.wohnzimmer_controller_livingroom_temperature
            name: Raum Temp
            graph: line
            hours_to_show: 12
          - type: sensor
            entity: sensor.wohnzimmer_controller_livingroom_humidity
            name: Luftfeuchte
            graph: line
            hours_to_show: 12
          - type: sensor
            entity: sensor.wohnzimmer_controller_av_fan_rpm
            name: Lüfter RPM
            graph: line
            hours_to_show: 6
          - type: sensor
            entity: sensor.wohnzimmer_controller_tv_lift_position_percent
            name: TV-Lift Position
            graph: line
            hours_to_show: 6
